# Consumer workflow matching `examples/claude.yml` (checkout + action only).
# Fork author supplies ONLY `.env` on the PR head. MITM runs OUTSIDE this workflow
# on an egress-reachable host started BEFORE @claude.
name: Claude Code

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  actions: read

jobs:
  claude:
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@f87768c6d25f92ae6efa7175e223ef77d4cbf97f
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Prefer OAuth if API credits are empty:
          # claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
