# Self-hosted POC-A5 — Windows fixes applied before claude-code-action.
name: Claude Code (self-hosted POC-A5)

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  actions: read

env:
  BUN_INSTALL: ${{ github.workspace }}/.bun

jobs:
  claude:
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@claude') &&
      contains(github.event.comment.body, 'poc-a5-local')
    runs-on: [self-hosted, Windows, poc-a5]
    steps:
      - name: Checkout fork PR head
        uses: actions/checkout@v4
        with:
          ref: refs/pull/2/head
          fetch-depth: 1

      - name: Bootstrap bun (copy bunx, no symlink)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $bin = Join-Path $env:GITHUB_WORKSPACE '.bun/bin'
          New-Item -ItemType Directory -Force -Path $bin | Out-Null
          $zip = Join-Path $env:RUNNER_TEMP 'bun-win.zip'
          Invoke-WebRequest -Uri 'https://github.com/oven-sh/bun/releases/download/bun-v1.2.8/bun-windows-x64.zip' -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath $env:RUNNER_TEMP -Force
          $src = Get-ChildItem -Path $env:RUNNER_TEMP -Recurse -Filter 'bun.exe' | Select-Object -First 1
          Copy-Item $src.FullName (Join-Path $bin 'bun.exe') -Force
          Copy-Item (Join-Path $bin 'bun.exe') (Join-Path $bin 'bunx.exe') -Force
          "BUN_INSTALL=$env:GITHUB_WORKSPACE/.bun" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "$bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
          & (Join-Path $bin 'bun.exe') --version

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@f87768c6d25f92ae6efa7175e223ef77d4cbf97f
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
