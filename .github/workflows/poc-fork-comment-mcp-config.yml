name: PoC - fork PR mcp-config file path

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  mcp-config-fork-poc:
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    steps:
      # Default branch only (examples/claude.yml pattern). Fork head via action setupBranch.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@f87768c6d25f92ae6efa7175e223ef77d4cbf97f
        with:
          # Claude Pro OAuth only (ANT-005 lesson: invalid API key / freemodel overrides Pro).
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          # Documented file-path form. Path is NOT in SENSITIVE_PATHS (only .mcp.json is).
          claude_args: "--mcp-config ./poc-mcp/mcp-config.json --allowedTools Read"

      - name: Collect mcp-config path proof
        if: always()
        run: |
          echo "=== MCP_CONFIG_FILE_COLLECTOR ==="
          echo "SETTINGS_CHANNEL=off"
          echo "MCP_CONFIG_FILE_CHANNEL=on"
          echo "MCP_CONFIG_PATH=./poc-mcp/mcp-config.json"
          {
            echo "### Collector markers"
            echo "- MCP_CONFIG_FILE_CHANNEL=on"
            echo "- path=./poc-mcp/mcp-config.json (not root .mcp.json)"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ -f .poc-mcp-config-proof.txt ]; then
            echo "PROOF_FILE=present"
            cat .poc-mcp-config-proof.txt
          else
            echo "BYPASS_PROOF proof_file=absent"
            echo "PROOF_FILE=absent"
          fi
